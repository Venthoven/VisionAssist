name: visionassist
description: Aplikasi Teknologi Bantu bagi Penyandang Gangguan Penglihatan

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Kamera
  camera: ^0.10.5+9

  # OCR - Google ML Kit
  google_mlkit_text_recognition: ^0.13.0

  # Text to Speech
  flutter_tts: ^4.0.2

  # Penyimpanan lokal
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Izin akses
  permission_handler: ^11.3.1

  # Image picker (untuk impor file)
  image_picker: ^0.8.9

  # File picker (untuk PDF, Word, TXT)
  file_picker: ^8.1.2

  # TFLite untuk YOLO
  tflite_flutter: ^0.11.0

  # Konversi gambar kamera
  image: ^4.1.7

  docx_to_text: ^1.0.1

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/yolov8n.tflite
    - assets/coco_labels.txt
